site_name: FiberPath
site_description: "FiberPath — an open, machine-agnostic filament-winding path planner"
site_url: https://fiberpath.org/
repo_url: https://github.com/fiberpath
repo_name: fiberpath
docs_dir: docs
site_dir: site

# This repo owns the whole site. Component repos (fiberpath, future repos)
# contribute only their docs/ markdown; deploy.yml imports each one into
# docs/<section>/ at build time. Nav is generated by awesome-pages from the
# file tree and the .pages files that travel with each component's content.

# No `edit_uri`: pages are imported from other repos, so a single edit link
# would point at the wrong place.
edit_uri: ""

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: orange

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fiberpath
      name: GitHub
