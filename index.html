<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FiberPath</title>
    <meta
      name="description"
      content="FiberPath — an open, machine-agnostic filament-winding path planner."
    />
    <style>
      :root {
        --bg: #0f1419;
        --fg: #e6e6e6;
        --muted: #9aa4ad;
        --accent: #5a8db3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font:
          16px/1.6 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-size: 3rem;
        margin: 0 0 0.25rem;
        letter-spacing: -0.02em;
      }
      p.tagline {
        color: var(--muted);
        font-size: 1.15rem;
        margin: 0 0 2rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      a.btn {
        display: inline-block;
        padding: 0.7rem 1.4rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid var(--accent);
      }
      a.primary {
        background: var(--accent);
        color: #0f1419;
      }
      a.secondary {
        color: var(--fg);
      }
      footer {
        margin-top: 3rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      footer a {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FiberPath</h1>
      <p class="tagline">
        An open, machine-agnostic filament-winding path planner.
      </p>
      <div class="actions">
        <a class="btn primary" href="/fiberpath/">Documentation</a>
        <a class="btn secondary" href="https://github.com/fiberpath">GitHub</a>
      </div>
      <footer>
        This is the FiberPath project hub. For now it hosts the
        <a href="/fiberpath/">software documentation</a>; more will land here over time.
      </footer>
    </main>
  </body>
</html>
